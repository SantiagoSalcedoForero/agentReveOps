services:
  bot:
    build: .
    container_name: verifty-bot
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: verifty-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
